<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Outer forge metallic core rating -->
    <linearGradient id="forge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    
    <!-- Red recording light pulse -->
    <radialGradient id="rec-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="55%" stop-color="#ef4444" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Circular container background -->
  <rect width="32" height="32" rx="8" fill="#0f172a" />

  <!-- Outer ring border -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#forge-grad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="64 12" />

  <!-- Inner aperture details -->
  <circle cx="16" cy="16" r="7" fill="#020617" stroke="#334155" stroke-width="1" />

  <!-- Glowing recording center -->
  <circle cx="16" cy="16" r="4.5" fill="url(#rec-glow)" />
  <circle cx="16" cy="16" r="2.5" fill="#fca5a5" />
</svg>
