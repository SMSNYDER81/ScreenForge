    <title>ScreenForge - Offline Private Screen Recorder</title>
    <!-- Deployment Trigger Revision: Sitemap Hash Fix -->

         crossorigin="anonymous"></script>

    <script src="https://quge5.com/88/tag.min.js" data-zone="243617" async data-cfasync="false"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Ad Service Worker registered successfully', reg.scope))
            .catch(err => {
              console.warn('Ad Service Worker sw.js failure, trying service-worker.js', err);
              navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('Ad Service Worker alternative registered successfully', reg.scope))
                .catch(err2 => console.error('Ad Service Worker registration failed', err2));
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
